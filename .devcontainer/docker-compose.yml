services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    volumes:
      - ..:/app:cached
      - ../../tvdb:/app/db:cached
    environment:
      - MECAB_API_URL=http://psv.internal:8097/parse
      - MECAB_API_URL_BATCH=http://psv.internal:8097/parseAll
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    tty: true
    stdin_open: true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # 開発中にコンテナが終了しないようにする
