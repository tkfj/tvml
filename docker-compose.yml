services:
  app:
    build: .
    volumes:
      - ../tvdb:/app/db
    environment:
      - MECAB_API_URL=http://psv.internal:8097/parse
      - MECAB_API_URL_BATCH=http://psv.internal:8097/parseAll
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
